        // --- App 狀態管理 ---

        let memoText = localStorage.getItem('shin_memo') || "";

        // --- 初始化頁面 ---
        window.onload = function() {
            switchTab('plan');
        };

        // --- 切換分頁核心邏輯 ---
        function switchTab(tabName) {
            currentTab = tabName;
            
            // 更新底部導航樣式
            const tabs = ['plan', 'guide', 'wallet', 'lists', 'info'];
            tabs.forEach(t => {
                const btn = document.getElementById(`nav-${t}`);
                if (t === tabName) {
                    btn.classList.add('bg-shinYellow', 'text-shinRed');
                    btn.classList.remove('text-slate-600');
                } else {
                    btn.classList.remove('bg-shinYellow', 'text-shinRed');
                    btn.classList.add('text-slate-600');
                }
            });

            // 渲染對應內容
            const container = document.getElementById('main-content');
            if (tabName === 'plan') renderPlan(container);
            if (tabName === 'guide') renderGuide(container);
            if (tabName === 'wallet') renderWallet(container);
            if (tabName === 'lists') renderLists(container);
            if (tabName === 'info') renderInfo(container);
            
            // 切換時回到頂部
            container.scrollTop = 0;
        }

        // 1. PLAN (行程表分頁)
        // ==========================================

                <div class="flex space-x-2 overflow-x-auto pb-3 mb-4 no-scrollbar">
            `;

        // --- 計算機與記帳邏輯群 ---
        function handleCalc(val) {
            const screen = document.getElementById('calc-screen');
            if (val === 'C') {
                calcInput = "";
            } else if (val === '=') {
                try {
                    // 安全過濾，只允許數學運算字元
                    let sanitized = calcInput.replace(/[^0-9+\-*/().]/g, '');
                    let res = new Function(`return ${sanitized}`)();
                    calcInput = String(Math.round(res * 100) / 100);
                    document.getElementById('exp-jpy').value = calcInput; // 直接將結果帶入日幣欄位
                } catch(e) {
                    calcInput = "Error";
                }
            } else {
                if (calcInput === "Error") calcInput = "";
                calcInput += val;
            }
            screen.innerText = calcInput || '0';
        }

        function updateRate(val) {
            exchangeRate = Number(val);
            localStorage.setItem('shin_rate', exchangeRate);
            renderWallet(document.getElementById('main-content'));
        }

        // 使用 Canvas 壓縮圖片，避免 LocalStorage 容量爆炸 (限制為 150px 縮圖)
        function processImage(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            document.getElementById('upload-status').innerText = "壓縮中...";
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const max_size = 150; 
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > height) {
                        if (width > max_size) { height *= max_size / width; width = max_size; }
                    } else {
                        if (height > max_size) { width *= max_size / height; height = max_size; }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    currentBase64Image = canvas.toDataURL('image/jpeg', 0.6); // 壓縮品質 0.6
                    document.getElementById('upload-status').innerText = "✅ 成功";
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

            let now = new Date();

            expenses.unshift({
                title: title,
                jpy: Number(jpy),
                img: currentBase64Image,
                date: dateStr

            currentBase64Image = ""; // 清空
            calcInput = "";
            renderWallet(document.getElementById('main-content'));
        }
