                        { time: "09:30 - 11:30", type: "spot", desc: "⛩️ 景點：寄存行李後，漫步【成田山新勝寺】與【表參道老街】。欣賞千年新勝寺大本堂與江戶木造黑瓦老街風情。", maps: "成田山新勝寺" },
                        { time: "11:30 - 13:00", type: "food", desc: "🍱 終極午餐：【川豐 本店 (Kawatoyo Hon-ten)】。明治 43 年傳奇老店，品嚐現殺現烤、肉質肥美入口即化的頂級特上鰻魚飯！", highlight: true, maps: "川豐 本店", blog: "https://www.google.com/search?q=川豐+鰻魚飯+食記" },
                        { time: "13:30 - 14:00", type: "transport", desc: "🚉 機場交通：回飯店拿行李，從【JR成田站】搭乘【JR成田線】僅 10 分鐘直達【成田機場 (Narita Kūkō)】。" },
                        { time: "16:00 之後", type: "transport", desc: "✈️ 回程航班：搭乘星宇航空 JX315，帶著滿滿的戰利品與飽足的胃返回台灣，回到溫暖的家！", highlight: true }
                    ]
                }
            },
            defaultChecklist: [
                "護照", "外幣", "台幣", "美金", "信用卡", "原子筆", "飯店證明", "sim卡", "手機", "耳機", 
                "行動電源（記得用夾鏈袋裝起來）", "充電器", "衛生紙", "濕紙巾", "口罩", "衛生棉", 
                "護手霜", "水壺", "暈車藥", "備用藥（第一天夠吃即可）", "墨鏡", "薄外套", "絲巾", 
                "圍巾", "補妝用品", "遮陽帽", "行李秤"
            ]
        };

        // --- App 狀態 ---
        let currentTab = 'plan';
        let selectedDay = 1;
        let expenses = JSON.parse(localStorage.getItem('shin_expenses')) || [];
        let exchangeRate = localStorage.getItem('shin_rate') || 0.215;
        let checklist = JSON.parse(localStorage.getItem('shin_checklist')) || tripData.defaultChecklist.map(item => ({ text: item, done: false }));
        let memoText = localStorage.getItem('shin_memo') || "";

        window.onload = function() {
            switchTab('plan');
        };

        // --- Tab 切換 ---
        function switchTab(tabName) {
            currentTab = tabName;
            const tabs = ['plan', 'guide', 'wallet', 'lists', 'info'];
            tabs.forEach(t => {
                const btn = document.getElementById(`nav-${t}`);
                if (t === tabName) {
                    btn.classList.add('bg-shinYellow', 'text-shinRed');
                    btn.classList.remove('text-slate-600');
                } else {
                    btn.classList.remove('bg-shinYellow', 'text-shinRed');
                    btn.classList.add('text-slate-600');
                }
            });

            const container = document.getElementById('main-content');
            if (tabName === 'plan') renderPlan(container);
            if (tabName === 'guide') renderGuide(container);
            if (tabName === 'wallet') renderWallet(container);
            if (tabName === 'lists') renderLists(container);
            if (tabName === 'info') renderInfo(container);
            container.scrollTop = 0;
        }

        // ==========================================
        // 1. PLAN (行程表)
        // ==========================================
        function renderPlan(el) {
            let html = `<div class="flex space-x-2 overflow-x-auto pb-3 mb-4 no-scrollbar">`;
            for (let i = 1; i <= 7; i++) {
                const activeClass = selectedDay === i ? 'bg-shinRed text-white' : 'bg-white text-slate-800';
                html += `
                    <button onclick="selectedDay=${i}; renderPlan(document.getElementById('main-content'))" 
                            class="shin-border shin-shadow-sm px-4 py-1.5 rounded-xl font-black text-xs whitespace-nowrap ${activeClass} shin-btn-press">
                        D${i} (${tripData.itinerary[i].date})
                    </button>
                `;
            }
            html += `</div>`;

            const dayInfo = tripData.itinerary[selectedDay];
            html += `
                <div class="bg-shinLightBlue p-3 rounded-2xl shin-border shin-shadow mb-4">
                    <h2 class="text-sm font-black text-slate-900 flex items-center">
                        <span class="bg-white px-2 py-0.5 rounded-md shin-border text-[10px] mr-2">DAY ${selectedDay}</span>
                        ${dayInfo.title}
                    </h2>
                </div>
                <div class="relative border-l-4 border-dashed border-slate-700 ml-4 pl-4 space-y-4">
            `;

            dayInfo.items.forEach(item => {
                const highlightClass = item.highlight ? 'border-shinRed bg-red-50' : 'border-slate-800 bg-white';
                const badgeColor = item.highlight ? 'bg-shinRed text-white' : 'bg-slate-800 text-white';
                
                html += `
                    <div class="relative">
                        <div class="absolute -left-[24px] top-1.5 w-3 h-3 rounded-full bg-slate-800 border-2 border-white"></div>
                        <div class="p-3 rounded-xl border-2 shin-shadow-sm ${highlightClass}">
                            <div class="mb-1"><span class="text-[10px] font-black px-2 py-0.5 rounded ${badgeColor}">${item.time}</span></div>
                            <p class="text-xs font-bold text-slate-800 leading-relaxed mb-2">${item.desc}</p>
                            <div class="flex space-x-2">
                `;
                if (item.maps) {
                    html += `
                        <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.maps)}" target="_blank" 
                           class="text-[10px] bg-shinYellow font-black px-2 py-1 rounded-md border-2 border-slate-800 shin-shadow-sm flex items-center space-x-1">
                            <i class="fa-solid fa-location-dot"></i> <span>地圖</span>
                        </a>
                    `;
                }
                if (item.blog) {
                    html += `
                        <a href="${item.blog}" target="_blank" 
                           class="text-[10px] bg-shinPink text-white font-black px-2 py-1 rounded-md border-2 border-slate-800 shin-shadow-sm flex items-center space-x-1">
                            <i class="fa-solid fa-utensils"></i> <span>食記</span>
                        </a>
                    `;
                }
                html += `</div></div></div>`;
            });

            html += `</div>`;
            el.innerHTML = html;
        }

        // ==========================================
        // 2. GUIDE (深度導覽)
        // ==========================================
        function renderGuide(el) {
            el.innerHTML = `
                <div class="space-y-4">
                    <div class="bg-shinPink text-white p-2.5 rounded-xl shin-border shin-shadow font-black text-center text-sm tracking-wider">
                        🎒 親友專屬景點祕笈
                    </div>

                    <div class="bg-white p-4 rounded-2xl shin-border shin-shadow">
                        <h3 class="text-sm font-black text-slate-900 border-b-2 border-slate-800 pb-1 mb-2">🎨 teamLab Planets TOKYO (新豐洲)</h3>
                        <p class="text-xs font-bold text-slate-600 bg-yellow-100 p-2 rounded-lg mb-2">
                            💡 必須赤腳涉水的宇宙光影展！水深最深會到小腿肚，請大家當天務必穿著方便捲起褲管的寬鬆長褲。部分地板是亮面鏡子，穿裙子的女生請內搭安全褲！
                        </p>
                        <div class="w-full h-36 rounded-xl overflow-hidden shin-border mb-1">
                            <iframe width="100%" height="100%" src="https://www.openstreetmap.org/export/embed.html?bbox=139.785%2C35.647%2C139.795%2C35.653&amp;layer=mapnik" style="border: none"></iframe>
                        </div>
                    </div>

                    <div class="bg-white p-4 rounded-2xl shin-border shin-shadow">
                        <h3 class="text-sm font-black text-slate-900 border-b-2 border-slate-800 pb-1 mb-2">⛩️ 鎌倉高德院 (Kōtoku-in) 大佛</h3>
                        <p class="text-xs font-bold text-slate-600 leading-relaxed">
                            這尊高達 11.3 公尺的青銅國寶大佛創立於 1252 年。最有趣的冷知識是：只要付 20 日圓的香油錢，大家就能真正「鑽進大佛的肚子內部」參觀，體驗中空的古代鑄造工藝！
                        </p>
                    </div>

                    <div class="bg-white p-4 rounded-2xl shin-border shin-shadow">
                        <h3 class="text-sm font-black text-slate-900 border-b-2 border-slate-800 pb-1 mb-2">🚊 湘南單軌電車 (Shōnan Monorēru)</h3>
                        <p class="text-xs font-bold text-slate-600 leading-relaxed">
                            全日本非常罕見的「懸吊式」單軌火車！車廂像吊車一樣掛在軌道下方空走，沿途上下坡與過彎速度感十足，坐起來像在坐溫和版的雲霄飛車，刺激又好玩。
                        </p>
                    </div>
                </div>
            `;
        }

        // ==========================================
        // 3. WALLET (記帳與匯率)
        // ==========================================
        let calcInput = "";
        let currentBase64Image = "";

        function renderWallet(el) {
            let totalJPY = expenses.reduce((sum, item) => sum + Number(item.jpy), 0);
            let totalTWD = Math.round(totalJPY * exchangeRate);

            let html = `
                <div class="bg-white p-3 rounded-2xl shin-border shin-shadow mb-4">
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-black text-xs text-slate-800">自訂換算匯率</span>
                        <input type="number" id="ex-rate" value="${exchangeRate}" step="0.001" onchange="updateRate(this.value)" 
                               class="w-20 text-center font-bold border-2 border-slate-800 rounded bg-shinYellow text-xs py-0.5">
                    </div>
                    <div class="grid grid-cols-2 gap-2 text-center border-t-2 border-slate-800 pt-2">
                        <div class="bg-red-50 p-2 rounded-xl border-2 border-slate-800">
                            <div class="text-[10px] text-slate-500 font-bold">總花費 (日幣)</div>
                            <div class="text-md font-black text-shinRed">¥ ${totalJPY.toLocaleString()}</div>
                        </div>
                        <div class="bg-blue-50 p-2 rounded-xl border-2 border-slate-800">
                            <div class="text-[10px] text-slate-500 font-bold">折合台幣</div>
                            <div class="text-md font-black text-shinBlue">NT$ ${totalTWD.toLocaleString()}</div>
                        </div>
                    </div>
                </div>

                <div class="bg-white p-3 rounded-2xl shin-border shin-shadow mb-4">
                    <h3 class="font-black text-slate-800 mb-2 text-xs"><i class="fa-solid fa-calculator"></i> 快速算式計算機</h3>
                    <div id="calc-screen" class="bg-slate-100 p-2 rounded-lg text-right font-mono font-bold text-md border-2 border-slate-800 min-h-[36px] mb-2 text-slate-700">
                        ${calcInput || '0'}
                    </div>
                    <div class="grid grid-cols-4 gap-1 mb-2">
                        ${['7','8','9','/','4','5','6','*','1','2','3','-','0','.','+','C'].map(btn => {
                            let btnBg = 'bg-slate-200';
                            if (['/','*','-','+'].includes(btn)) btnBg = 'bg-shinLightBlue text-white';
                            if (btn === 'C') btnBg = 'bg-shinRed text-white';
                            return `<button onclick="handleCalc('${btn}')" class="${btnBg} border-2 border-slate-800 rounded-lg p-1 font-black text-xs shin-shadow-sm shin-btn-press">${btn}</button>`;
                        }).join('')}
                        <button onclick="handleCalc('=')" class="col-span-4 bg-shinYellow border-2 border-slate-800 rounded-lg p-1 font-black text-xs shin-shadow-sm shin-btn-press">=</button>
                    </div>

                    <div class="space-y-1.5 border-t-2 border-slate-200 pt-2">
                        <input type="text" id="exp-title" placeholder="品項名稱（如：千客萬來海鮮丼）" class="w-full p-1.5 text-xs font-bold border-2 border-slate-800 rounded-lg">
                        <div class="flex space-x-2">
                            <input type="number" id="exp-jpy" placeholder="日幣金額" class="w-1/2 p-1.5 text-xs font-bold border-2 border-slate-800 rounded-lg">
                            <label class="w-1/2 bg-slate-800 text-white p-1.5 rounded-lg font-black text-xs flex items-center justify-center space-x-1 cursor-pointer border-2 border-slate-800 shin-shadow-sm">
                                <i class="fa-solid fa-camera"></i> <span id="upload-status">拍收據/商品</span>
                                <input type="file" accept="image/*" capture="environment" onchange="processImage(event)" class="hidden">
                            </label>
                        </div>
                        <button onclick="addExpense()" class="w-full bg-shinGreen border-2 border-slate-800 rounded-xl py-1.5 font-black text-xs text-slate-800 shin-shadow-sm shin-btn-press">
                            ＋ 記錄花費
                        </button>
                    </div>
                </div>

                <div class="bg-white p-3 rounded-2xl shin-border shin-shadow">
                    <h3 class="font-black text-slate-800 mb-2 text-xs"><i class="fa-solid fa-receipt"></i> 記帳歷史明細</h3>
                    <div class="space-y-2 max-h-48 overflow-y-auto no-scrollbar">
            `;

            if (expenses.length === 0) {
                html += `<p class="text-[11px] font-bold text-slate-400 text-center py-4">還沒有記帳明細喔！</p>`;
            } else {
                expenses.forEach((item, index) => {
                    let twd = Math.round(item.jpy * exchangeRate);
                    html += `
                        <div class="flex items-center justify-between p-1.5 border-2 border-slate-800 rounded-xl bg-slate-50">
                            <div class="flex items-center space-x-2">
                                ${item.img ? `<img src="${item.img}" class="w-8 h-8 object-cover rounded border-2 border-slate-800">` : `<div class="w-8 h-8 bg-slate-200 border-2 border-slate-800 rounded flex items-center justify-center text-xs">🛍️</div>`}
                                <div>
                                    <div class="text-xs font-black text-slate-800">${item.title}</div>
                                    <div class="text-[9px] font-bold text-slate-400">${item.date}</div>
                                </div>
                            </div>
                            <div class="text-right flex items-center space-x-2">
                                <div>
                                    <div class="text-xs font-black text-shinRed">¥${Number(item.jpy).toLocaleString()}</div>
                                    <div class="text-[9px] font-bold text-slate-400">NT$${twd}</div>
                                </div>
                                <button onclick="deleteExpense(${index})" class="text-slate-400 hover:text-shinRed p-1"><i class="fa-solid fa-trash-can"></i></button>
                            </div>
                        </div>
                    `;
                });
            }

            html += `</div></div>`;
            el.innerHTML = html;
        }

        function handleCalc(val) {
            const screen = document.getElementById('calc-screen');
            if (val === 'C') {
                calcInput = "";
            } else if (val === '=') {
                try {
                    let sanitized = calcInput.replace(/[^0-9+\-*/().]/g, '');
                    let res = new Function(`return ${sanitized}`)();
                    calcInput = String(Math.round(res * 100) / 100);
                    document.getElementById('exp-jpy').value = calcInput;
                } catch(e) {
                    calcInput = "Error";
                }
            } else {
                if (calcInput === "Error") calcInput = "";
                calcInput += val;
            }
            screen.innerText = calcInput || '0';
        }

        function updateRate(val) {
            exchangeRate = Number(val);
            localStorage.setItem('shin_rate', exchangeRate);
            renderWallet(document.getElementById('main-content'));
        }

        function processImage(event) {
            const file = event.target.files[0];
            if (!file) return;
            document.getElementById('upload-status').innerText = "壓縮中...";
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const max_size = 120; 
                    let width = img.width, height = img.height;
                    if (width > height) {
                        if (width > max_size) { height *= max_size / width; width = max_size; }
                    } else {
                        if (height > max_size) { width *= max_size / height; height = max_size; }
                    }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    currentBase64Image = canvas.toDataURL('image/jpeg', 0.5);
                    document.getElementById('upload-status').innerText = "✅ 成功";
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        function addExpense() {
            const title = document.getElementById('exp-title').value.trim();
            const jpy = document.getElementById('exp-jpy').value.trim();
            if (!title || !jpy) return;
            let now = new Date();
            let dateStr = `${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            expenses.unshift({ title: title, jpy: Number(jpy), img: currentBase64Image, date: dateStr });
            localStorage.setItem('shin_expenses', JSON.stringify(expenses));
            currentBase64Image = ""; calcInput = "";
            renderWallet(document.getElementById('main-content'));
        }

        function deleteExpense(index) {
            expenses.splice(index, 1);
            localStorage.setItem('shin_expenses', JSON.stringify(expenses));
            renderWallet(document.getElementById('main-content'));
        }

        // ==========================================
        // 4. LISTS (清單與個人備忘錄)
        // ==========================================
        function renderLists(el) {
            let html = `
                <div class="bg-white p-3 rounded-2xl shin-border shin-shadow mb-4">
                    <h3 class="font-black text-slate-800 mb-2 text-xs flex items-center justify-between">
                        <span><i class="fa-solid fa-suitcase-rolling text-shinPink"></i> 行前準備 CheckList</span>
                        <span class="text-[10px] bg-slate-200 px-2 py-0.5 rounded-full">${checklist.filter(c=>c.done).length}/${checklist.length}</span>
                    </h3>
                    <div class="space-y-1.5 max-h-52 overflow-y-auto no-scrollbar border-b-2 border-slate-100 pb-2">
            `;

            checklist.forEach((item, index) => {
                const checkedAttr = item.done ? 'checked' : '';
                const textStyle = item.done ? 'line-through text-slate-400' : 'text-slate-700';
                html += `
                    <label class="flex items-center space-x-2.5 p-0.5 cursor-pointer">
                        <input type="checkbox" ${checkedAttr} onchange="toggleCheck(${index})" class="w-3.5 h-3.5 rounded border-2 border-slate-800 text-shinPink">
                        <span class="text-xs font-bold ${textStyle}">${item.text}</span>
                    </label>
                `;
            });

            html += `
                    </div>
                    <div class="flex space-x-2 mt-2">
                        <input type="text" id="new-item-text" placeholder="自訂要帶的物品..." class="flex-1 p-1.5 text-xs font-bold border-2 border-slate-800 rounded-lg">
                        <button onclick="addChecklistItem()" class="bg-shinPink text-white px-3 rounded-lg font-black text-xs border-2 border-slate-800 shin-shadow-sm">＋</button>
                    </div>
                </div>

                <div class="bg-white p-3 rounded-2xl shin-border shin-shadow">
                    <h3 class="font-black text-slate-800 mb-1.5 text-xs"><i class="fa-solid fa-pen-to-square text-shinYellow"></i> 個人隨手小筆記</h3>
                    <textarea id="memo-area" oninput="saveMemo(this.value)" placeholder="輸入臨時找到的資訊...\n若有 http 網址會自動在下方生成點擊按鈕！" 
                              class="w-full h-24 p-1.5 text-xs font-bold border-2 border-slate-800 rounded-lg bg-shinBg resize-none focus:outline-none">${memoText}</textarea>
                    <div class="mt-1">
                        <div id="memo-links" class="flex flex-wrap gap-1"></div>
                    </div>
                </div>
            `;
            el.innerHTML = html;
            parseMemoLinks();
        }

        function toggleCheck(index) {
            checklist[index].done = !checklist[index].done;
            localStorage.setItem('shin_checklist', JSON.stringify(checklist));
            renderLists(document.getElementById('main-content'));
        }

        function addChecklistItem() {
            const input = document.getElementById('new-item-text');
            const text = input.value.trim();
            if (!text) return;
            checklist.push({ text: text, done: false });
            localStorage.setItem('shin_checklist', JSON.stringify(checklist));
            renderLists(document.getElementById('main-content'));
        }

        function saveMemo(val) {
            memoText = val;
            localStorage.setItem('shin_memo', memoText);
            parseMemoLinks();
        }

        function parseMemoLinks() {
            const linkContainer = document.getElementById('memo-links');
            if (!linkContainer) return;
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            const matches = memoText.match(urlRegex);
            if (!matches) {
                linkContainer.innerHTML = `<span class="text-[9px] text-slate-400 font-bold italic">無偵測到網址</span>`;
                return;
            }
            let html = "";
            matches.forEach((url, idx) => {
                let displayUrl = url.length > 20 ? url.substring(0, 20) + "..." : url;
                html += `
                    <a href="${url}" target="_blank" class="text-[9px] bg-shinYellow font-black px-2 py-0.5 rounded border-2 border-slate-800 shin-shadow-sm flex items-center space-x-1">
                        <i class="fa-solid fa-link"></i> <span>連結 ${idx+1}</span>
                    </a>
                `;
            });
            linkContainer.innerHTML = html;
        }

        // ==========================================
        // 5. INFO (實用生活資訊)
        // ==========================================
        function renderInfo(el) {
            el.innerHTML = `
                <div class="space-y-3">
                    <div class="bg-white p-3 rounded-2xl shin-border shin-shadow">
                        <h3 class="font-black text-slate-800 text-xs mb-1.5"><i class="fa-solid fa-cloud-sun text-shinLightBlue"></i> 日本即時天氣預報</h3>
                        <a href="https://www.jma.go.jp/jma/index.html" target="_blank" 
                           class="w-full bg-shinLightBlue text-slate-800 border-2 border-slate-800 font-black p-2 rounded-xl flex items-center justify-between text-xs">
                            <span>☀️ 進入日本氣象廳 (JMA) 官網</span><i class="fa-solid fa-chevron-right"></i>
                        </a>
                    </div>

                    <div class="bg-white p-3 rounded-2xl shin-border shin-shadow">
                        <h3 class="font-black text-slate-800 text-xs mb-1.5"><i class="fa-solid fa-phone-volume text-shinRed"></i> 日本緊急求助熱線</h3>
                        <div class="space-y-1 text-xs font-bold">
                            <div class="flex justify-between items-center bg-slate-50 p-1.5 border border-slate-300 rounded-lg">
                                <span class="text-slate-700 text-[11px]">🚨 警察局（犯罪、交通事故）</span><a href="tel:110" class="text-shinRed font-black bg-white px-2 py-0.5 border-2 border-slate-800 rounded-md">110</a>
